# Deploy to Vercel on push to main
# 1. In GitHub: Settings → Secrets and variables → Actions → add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# 2. Get them from vercel.com: Project Settings → General, or run "vercel link" locally and check .vercel/project.json
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
